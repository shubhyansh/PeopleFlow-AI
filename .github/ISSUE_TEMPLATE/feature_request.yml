name: Feature request
description: Suggest an improvement or new capability.
title: "[feat] "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Before opening: please skim the [Roadmap](../../README.md#-the-roadmap) to see if this
        is already on the list (and what state it's in).

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the user-visible problem. Avoid jumping to the solution.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Sketch what the change would look like — UX, data model, IPC, anything relevant.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other ways to solve the same problem and why they're worse.

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - Tiny (one file, no migration)
        - Small (a feature toggle or a new screen)
        - Medium (touches IPC + DB + UI)
        - Large (rethinks something architectural)
    validations:
      required: true

  - type: checkboxes
    id: confirmations
    attributes:
      label: Confirmations
      options:
        - label: I checked the Roadmap and existing issues.
          required: true
        - label: I'm willing to either implement this or help review a PR for it.
          required: false
