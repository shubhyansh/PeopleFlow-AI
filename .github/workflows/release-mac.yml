name: Release (macOS)

# Triggers:
#   - Push a semver tag (`git tag v0.1.0 && git push --tags`)  → builds + publishes a GitHub Release with the .dmg attached
#   - "Run workflow" button in the Actions tab                  → builds + uploads .dmg as a workflow artifact (no Release)

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    timeout-minutes: 30
    permissions:
      contents: write  # needed by softprops/action-gh-release to create/update releases

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Build (.dmg for arm64 + x64)
        env:
          # Supabase URL + anon key are NOT baked at build time. Each end user
          # enters their own values in FlowDesk's first-launch setup screen,
          # and the values are saved to ~/Library/Application Support/FlowDesk/.
          # No Apple Developer ID — skip code signing. End user uses right-click → Open on first launch.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npm run dist

      - name: Attach DMGs to Release (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.dmg
            release/*.dmg.blockmap
          generate_release_notes: true

      - name: Upload DMGs as workflow artifact (manual runs)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: FlowDesk-mac-${{ github.run_number }}
          path: release/*.dmg
          if-no-files-found: error
